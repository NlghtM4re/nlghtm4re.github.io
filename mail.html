<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Email Sender</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <script src="https://cdn.emailjs.com/dist/email.min.js"></script>
</head>
<body>
    <header>
        <div class="navbar">
            <div class="subnav">
                <a class="subnavbtn" href="index.html">Home</a>
            </div>
        </div>
        <br>
    </header>

    <h2 style="color: white; display: flex; justify-content: center;">Enter ideas for this website</h2>

    <form id="email-form">
        <input type="text" class="cc" name="name" placeholder="Your Name" required>
        <input type="text" class="cc" name="message" placeholder="Enter your ideas here..." required>
        <button type="submit" class="Start">Send Email</button>
    </form>

    <footer>
        <script src="main.js"></script>
    </footer>
</body>
</html>
